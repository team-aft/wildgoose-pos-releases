name: Build & Release AFT-POS Desktop

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "릴리즈 채널 (prod=최신 release/*, dev=develop)"
        type: choice
        options: [prod, dev]
        default: prod
      ref:
        description: "(선택) 빌드 브랜치/태그 직접 지정 — 비우면 채널에 따라 자동"
        required: false
        default: ""

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      CHANNEL: ${{ github.event.inputs.channel }}
      TAG: ${{ github.event.inputs.channel == 'dev' && 'dev-latest' || 'prod-latest' }}
    steps:
      # ref 비어있으면 채널에 따라 자동 선택 (prod=최신 release/*, dev=develop)
      - name: Resolve build ref
        id: ref
        run: |
          $ref = "${{ github.event.inputs.ref }}".Trim()
          if (-not $ref) {
            if ("${{ github.event.inputs.channel }}" -eq "prod") {
              $url = "https://x-access-token:${env:CODE_TOKEN}@github.com/team-aft/wildgoose-pos.git"
              $heads = git ls-remote --heads $url "refs/heads/release/*"
              $latest = $heads |
                ForEach-Object { ($_ -split "`t")[1] -replace "^refs/heads/","" } |
                Where-Object { $_ -match "^release/\d+\.\d+(\.\d+)?$" } |
                Sort-Object { [version]($_ -replace "^release/","") } |
                Select-Object -Last 1
              if (-not $latest) { Write-Error "release/* 브랜치를 찾지 못했습니다"; exit 1 }
              $ref = $latest
            } else {
              $ref = "develop"
            }
          }
          "ref=$ref" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "채널=${{ github.event.inputs.channel }} → 빌드 ref: $ref"
        env:
          CODE_TOKEN: ${{ secrets.CODE_REPO_TOKEN }}

      - name: Checkout private code repo
        uses: actions/checkout@v4
        with:
          repository: team-aft/wildgoose-pos
          ref: ${{ steps.ref.outputs.ref }}
          token: ${{ secrets.CODE_REPO_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps (tauri CLI)
        run: npm ci

      # 같은 채널의 이전 릴리즈/태그 제거 (있을 때만, 없으면 조용히 통과)
      - name: Delete previous channel release
        run: |
          if (gh release view "$env:TAG" --repo ${{ github.repository }} 2>$null) {
            gh release delete "$env:TAG" --repo ${{ github.repository }} --yes --cleanup-tag
          } else {
            Write-Host "기존 $env:TAG 릴리즈 없음 — 건너뜀"
          }
          exit 0
        env:
          GH_TOKEN: ${{ secrets.CODE_REPO_TOKEN }}

      - name: Build & publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.CODE_REPO_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          tagName: ${{ env.TAG }}
          releaseName: "AFT-POS ${{ env.CHANNEL }} (__VERSION__)"
          releaseDraft: false
          includeUpdaterJson: true
          args: ${{ github.event.inputs.channel == 'dev' && '--config src-tauri/tauri.devserver.conf.json' || '' }}
