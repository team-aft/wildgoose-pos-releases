name: Build & Release AFT-POS Desktop

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "빌드할 코드 repo 브랜치/태그"
        default: release/0.4.0
        required: true
      channel:
        description: "릴리즈 채널"
        type: choice
        options: [prod, dev]
        default: prod

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      CHANNEL: ${{ github.event.inputs.channel }}
      TAG: ${{ github.event.inputs.channel == 'dev' && 'dev-latest' || 'prod-latest' }}
    steps:
      - name: Checkout private code repo
        uses: actions/checkout@v4
        with:
          repository: team-aft/wildgoose-pos
          ref: ${{ github.event.inputs.ref }}
          token: ${{ secrets.CODE_REPO_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps (tauri CLI)
        run: npm ci

      # 같은 채널의 이전 릴리즈/태그 제거 (덮어쓰기)
      - name: Delete previous channel release
        run: gh release delete "$env:TAG" --repo ${{ github.repository }} --yes --cleanup-tag
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          tagName: ${{ env.TAG }}
          releaseName: "AFT-POS ${{ env.CHANNEL }} (__VERSION__)"
          releaseDraft: false
          includeUpdaterJson: true
          args: ${{ github.event.inputs.channel == 'dev' && '--config src-tauri/tauri.devserver.conf.json' || '' }}
